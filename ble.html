<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESP32 BLE UART</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #0f0f13;
    color: #e8e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 3rem;
  }
  header { text-align: center; margin-bottom: 2rem; }
  header h1 { font-size: 22px; font-weight: 600; color: #fff; }
  header p { font-size: 13px; color: #555; margin-top: 4px; }

  .panel { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }

  .card { background: #18181f; border: 1px solid #2a2a35; border-radius: 14px; padding: 1rem 1.2rem; }
  .card-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #555; margin-bottom: 0.7rem; }

  /* status */
  .status-pill { display: flex; align-items: center; gap: 10px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #333; flex-shrink: 0; }
  .dot.connected { background: #22c55e; box-shadow: 0 0 7px #22c55e99; }
  .dot.scanning  { background: #f59e0b; animation: pulse 0.9s infinite; }
  .dot.error     { background: #ef4444; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
  #status-text { font-size: 14px; color: #aaa; }

  /* buttons */
  button {
    font-size: 13px; font-weight: 500; padding: 9px 20px;
    border-radius: 9px; border: 1px solid #2a2a35;
    background: #222230; color: #ccc; cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  button:hover:not(:disabled) { background: #2e2e40; color: #fff; }
  button:active:not(:disabled) { transform: scale(0.96); }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  button.accent { background: #4f6ef7; color: #fff; border-color: #4f6ef7; }
  button.accent:hover:not(:disabled) { background: #6680ff; border-color: #6680ff; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

  /* send */
  .send-row { display: flex; gap: 8px; }
  .send-row input {
    flex: 1; font-size: 14px; padding: 9px 14px;
    background: #0f0f13; border: 1px solid #2a2a35;
    border-radius: 9px; color: #eee; outline: none; transition: border-color 0.15s;
  }
  .send-row input:focus { border-color: #4f6ef7; }
  .send-row input:disabled { opacity: 0.3; }
  .send-row input::placeholder { color: #333; }

  /* dpad */
  .dpad { display: grid; grid-template-columns: repeat(3, 72px); grid-template-rows: repeat(3, 72px); gap: 8px; justify-content: center; }
  .dpad button {
    width: 72px; height: 72px; padding: 0;
    border-radius: 12px; font-size: 22px;
    display: flex; align-items: center; justify-content: center;
  }
  .dpad .stop {
    background: #3a1a1a; border-color: #6b2020; color: #f87171;
    font-size: 13px; font-weight: 600;
  }
  .dpad .stop:hover:not(:disabled) { background: #4a2020; }
  .dpad .empty { visibility: hidden; }

  /* log */
  .log { font-family: monospace; font-size: 12px; line-height: 2; max-height: 160px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #2a2a35 transparent; }
  .log::-webkit-scrollbar { width: 4px; }
  .log::-webkit-scrollbar-thumb { background: #2a2a35; border-radius: 4px; }
  .log .sys { color: #444; }
  .log .tx  { color: #60a5fa; }
  .log .rx  { color: #4ade80; }
  .log .err { color: #f87171; }
</style>
</head>
<body>

<header>
  <h1>ESP32 BLE UART</h1>
  <p>Web Bluetooth</p>
</header>

<div class="panel">

  <div class="card">
    <div class="card-label">Estado</div>
    <div class="status-pill">
      <div class="dot" id="dot"></div>
      <span id="status-text">Desconectado</span>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Conexión</div>
    <div class="btn-row">
      <button class="accent" id="btn-connect" onclick="conectar()">Escanear y conectar</button>
      <button id="btn-disconnect" onclick="desconectar()" disabled>Desconectar</button>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Control</div>
    <div class="dpad">
      <div class="empty"></div>
      <button onclick="cmd('Avanzar')" disabled id="c-up">▲</button>
      <div class="empty"></div>
      <button onclick="cmd('Izquierda')" disabled id="c-left">◀</button>
      <button class="stop" onclick="cmd('DETENER')" disabled id="c-stop">STOP</button>
      <button onclick="cmd('Derecha')" disabled id="c-right">▶</button>
      <div class="empty"></div>
      <button onclick="cmd('Retroceder')" disabled id="c-down">▼</button>
      <div class="empty"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Mensaje libre</div>
    <div class="send-row">
      <input type="text" id="msg" placeholder="Escribe y presiona Enter..." disabled />
      <button id="btn-send" onclick="enviar()" disabled>Enviar</button>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Log</div>
    <div class="log" id="log">
      <div class="sys">— esperando conexión —</div>
    </div>
  </div>

</div>

<script>
const SVC_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const RX_UUID  = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
const TX_UUID  = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

let device, rxChar;

const ctrlBtns = ['c-up','c-down','c-left','c-right','c-stop','btn-send'];

function log(msg, tipo) {
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.className = tipo || 'sys';
  const ts = new Date().toLocaleTimeString('es', {hour12: false});
  d.textContent = ts + '  ' + msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function setStatus(texto, estado) {
  document.getElementById('status-text').textContent = texto;
  document.getElementById('dot').className = 'dot ' + (estado || '');
}

function setConectado(on) {
  document.getElementById('btn-connect').disabled = on;
  document.getElementById('btn-disconnect').disabled = !on;
  document.getElementById('msg').disabled = !on;
  ctrlBtns.forEach(id => document.getElementById(id).disabled = !on);
}

async function conectar() {
  if (!navigator.bluetooth) {
    log('Web Bluetooth no disponible. Usa Chrome/Edge.', 'err'); return;
  }
  try {
    setStatus('Escaneando...', 'scanning');
    log('Abriendo selector de dispositivos...');
    device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [SVC_UUID]
    });
    setStatus('Conectando...', 'scanning');
    log('Seleccionado: ' + device.name);
    const server  = await device.gatt.connect();
    const service = await server.getPrimaryService(SVC_UUID);
    rxChar = await service.getCharacteristic(RX_UUID);
    const txChar = await service.getCharacteristic(TX_UUID);
    await txChar.startNotifications();
    txChar.addEventListener('characteristicvaluechanged', onRecibir);
    device.addEventListener('gattserverdisconnected', onDesconectado);
    setStatus('Conectado — ' + device.name, 'connected');
    setConectado(true);
    log('Conectado a ' + device.name, 'rx');
  } catch (e) {
    setStatus('Error', 'error');
    log(e.message || 'Error al conectar', 'err');
  }
}

function onRecibir(e) {
  log('← ' + new TextDecoder().decode(e.target.value), 'rx');
}

function onDesconectado() {
  setStatus('Desconectado', 'error');
  setConectado(false);
  log('Dispositivo desconectado.', 'err');
}

function desconectar() {
  if (device && device.gatt.connected) device.gatt.disconnect();
}

async function cmd(texto) {
  if (!rxChar) return;
  try {
    await rxChar.writeValue(new TextEncoder().encode(texto + '\n'));
    log('→ ' + texto, 'tx');
  } catch (e) { log(e.message, 'err'); }
}

async function enviar() {
  const input = document.getElementById('msg');
  const texto = input.value.trim();
  if (!texto) return;
  await cmd(texto);
  input.value = '';
}

document.getElementById('msg').addEventListener('keydown', e => {
  if (e.key === 'Enter') enviar();
});
</script>
</body>
</html>
